name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: tests (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Install Playwright Chromium
        # Required for test_renderer_parity which compares canvas vs PIL.
        # Pipeline orchestration tests auto-skip (need live viewer/tool servers).
        run: |
          python -m playwright install --with-deps chromium

      - name: Syntax check
        run: |
          python -m compileall -q scripts src

      - name: Run tests
        run: |
          pytest -v tests/test_renderer_parity.py
        # test_pipeline_orchestration.py is skipped here because it requires
        # the viewer + tool server running. It's exercised locally via `make test`.

  lint:
    name: basic hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax check all Python
        run: |
          python -m compileall -q scripts src tests

      - name: Check for 0.0.0.0 bind regressions
        # The security review (CODE_REVIEW.md P0.1) moved default binds to
        # 127.0.0.1. Fail the build if anyone re-introduces a hard-coded
        # 0.0.0.0 literal in the server code.
        run: |
          if grep -nE '"0\.0\.0\.0"' scripts/viewer.py scripts/hermes_tools.py ; then
            echo "::error::hard-coded 0.0.0.0 bind reintroduced; use --host instead"
            exit 1
          fi

      - name: Check STYLE_DISPATCH stays funnelled through morph.py
        # Soft guard: warns (doesn't fail) if STYLE_DISPATCH[... appears
        # outside scripts/paint_lib/morph.py, which would indicate
        # someone bypassing the registry.
        run: |
          leaks=$(grep -rn "STYLE_DISPATCH\[" scripts src \
            --include="*.py" --exclude-dir=paint_lib | \
            grep -v "^$" || true)
          if [ -n "$leaks" ]; then
            echo "::warning::STYLE_DISPATCH lookups found outside morph.py:"
            echo "$leaks"
          fi
